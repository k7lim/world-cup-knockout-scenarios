name: Refresh static site data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: refresh-window
        run: node scripts/should-refresh-static-site.js --github-output

      - uses: actions/cache@v4
        if: github.event_name != 'schedule' || steps.refresh-window.outputs.active == 'true'
        with:
          path: data/odds-refresh-cache.json
          key: odds-refresh-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            odds-refresh-cache-${{ github.ref_name }}-

      - run: npm test
        if: github.event_name != 'schedule' || steps.refresh-window.outputs.active == 'true'

      - run: npm run export:static
        if: github.event_name != 'schedule' || steps.refresh-window.outputs.active == 'true'
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}
          ODDS_API_IO_BASE: ${{ vars.ODDS_API_IO_BASE }}

      - name: Commit refreshed snapshot
        if: github.event_name != 'schedule' || steps.refresh-window.outputs.active == 'true'
        run: |
          if git diff --quiet -- docs data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data
          git commit -m "Refresh World Cup static data"
          git push origin HEAD:gh-pages
